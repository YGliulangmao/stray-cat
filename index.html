<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">阳光学院<span>流浪猫</span></a>
            <div class="menu-toggle">☰</div>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">首页</a></li>
                    <li><a href="cats.html">猫猫</a></li>
                    <li><a href="adoption-process.html">领养流程</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero hero-slider">
        <div class="slide active"
            style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/banner1.jpg') center/cover;">
            <div class="container hero-content">
                <h1 class="hero-title">为流浪猫咪找一个家</h1>
                <p class="hero-subtitle">数百只可爱的猫咪正在等待它们永远的家，您会是它们的新主人吗？</p>
            </div>
        </div>
        <div class="slide"
            style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/banner2.jpg') center/cover;">
            <div class="container hero-content">
                <h1 class="hero-title">领养代替购买</h1>
                <p class="hero-subtitle">给无家可归的流浪猫第二次获得幸福和关爱的机会</p>
            </div>
        </div>
        <div class="slider-dots"></div>
    </section>

    <section class="section" style="background-color: #ff7e5f; color: white;">
        <div class="container">
            <h2 class="section-title" style="color: white;">准备好领养了吗？</h2>
            <div style="max-width: 600px; margin: 0 auto; text-align: center;">
                <p style="margin-bottom: 2rem;">填写我们的领养申请表，开始您的领养之旅。</p>
                <a href="adoption-process.html" class="btn" style="background-color: white; color: #ff7e5f;">开始申请</a>

    <script src="js/slider.js"></script>
